<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Restore path encoded by 404.html for GitHub Pages SPA routing.
      (function () {
        var search = window.location.search;
        if (search.startsWith('?p=')) {
          var params = search.slice(1).split('&');
          var path = '/' + params[0].slice(2).replace(/~and~/g, '&');
          var query = '';
          for (var i = 1; i < params.length; i++) {
            if (params[i].startsWith('q=')) {
              query = '?' + params[i].slice(2).replace(/~and~/g, '&');
            }
          }
          window.history.replaceState(null, null, path + query + window.location.hash);
        }
      })();
    </script>
